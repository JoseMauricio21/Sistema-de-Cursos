<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - English Learning Platform</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <video autoplay muted loop class="video-bg">
        <source src="https://videos.pexels.com/video-files/33617447/14288617_1920_1080_30fps.mp4" type="video/mp4">
    </video>
    
    <div class="container">
        <div class="form-container">
            <div class="header header-with-logo">
                <img src="../images/logo t.png" alt="Logo" class="header-logo">
                <div class="header-text">
                    <div class="header-icon"></div>
                    <h2>Crear Cuenta</h2>
                    <p class="subtitle">Únete a nuestra comunidad de aprendizaje</p>
                </div>
            </div>

            <form id="registerForm" onsubmit="validateRegisterForm(event)">
                <div class="form-group">
                    <label for="fullname">Nombre Completo:</label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="fullname" 
                            name="fullname" 
                            placeholder="Tu nombre completo"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="tu@email.com"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Mínimo 6 caracteres"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña:</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="Confirma tu contraseña"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="animated-button">
                    <svg xmlns="http://www.w3.org/2000/svg" class="arr-2" viewBox="0 0 24 24">
                        <path d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"></path>
                    </svg>
                    <span class="text">Crear Cuenta</span>
                    <span class="circle"></span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="arr-1" viewBox="0 0 24 24">
                        <path d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"></path>
                    </svg>
                </button>
            </form>

            <div class="link-section">
                <p>¿Ya tienes cuenta? <a href="login.html" class="toggle-link">Inicia sesión aquí</a></p>
                <p><a href="../index.html" class="toggle-link">← Volver al inicio</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/script.js"></script>
</body>
</html>
