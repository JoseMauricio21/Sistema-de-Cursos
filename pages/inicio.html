<!-- Inicio Section Content -->
<div class="welcome-banner">
    <button class="profile-link-btn" id="profileLinkBtn" title="Ir a mi perfil">
        <img src="../images/logo t.png" alt="Perfil" class="welcome-profile-pic" id="welcomeProfilePic">
    </button>
    <div class="welcome-content">
        <h2 class="welcome-title">Bienvenido</h2>
        <p class="welcome-username" id="welcomeUsername">jose mauricio</p>
    </div>
</div>

<div class="section-header">
    <h2>Dashboard Principal</h2>
    <p class="section-subtitle">Acceso rápido a tus cursos y exámenes</p>
</div>

<div class="quick-access-grid">
    <div class="quick-access-card">
        <div class="card-icon">
            <i class="fas fa-book"></i>
        </div>
        <h3>Mis Cursos</h3>
        <p>Continúa con tus cursos activos</p>
        <button class="btn btn-primary" onclick="document.querySelector('input[value=\'mis-cursos\']').click()">Ir a Cursos</button>
    </div>

    <div class="quick-access-card">
        <div class="card-icon">
            <i class="fas fa-file-alt"></i>
        </div>
        <h3>Exámenes</h3>
        <p>Revisa tus próximos exámenes</p>
        <button class="btn btn-primary" onclick="document.querySelector('input[value=\'examenes\']').click()">Ir a Exámenes</button>
    </div>

    <div class="quick-access-card">
        <div class="card-icon">
            <i class="fas fa-chart-line"></i>
        </div>
        <h3>Tu Progreso</h3>
        <p>Monitorea tu avance académico</p>
        <button class="btn btn-secondary">Ver Progreso</button>
    </div>

    <div class="quick-access-card">
        <div class="card-icon">
            <i class="fas fa-bell"></i>
        </div>
        <h3>Notificaciones</h3>
        <p>Últimas actualizaciones y eventos</p>
        <button class="btn btn-secondary">Ver Todo</button>
    </div>
</div>
