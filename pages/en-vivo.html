<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>BANDAMAX HD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Shaka Player -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      width: 100%;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
    }
    #unmuteBtn {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      padding: 10px 14px;
      font-size: 14px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<video id="video"
       controls
       autoplay
       muted
       playsinline>
  Tu navegador no soporta video HTML5.
</video>

<button id="unmuteBtn" type="button">Toca para activar el audio</button>

<script>
async function init() {
  try {
    // Instalar polyfills
    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
      document.querySelector('video').style.display = 'none';
      document.body.innerHTML += '<div style="color: white; padding: 20px;">Navegador no compatible con Shaka Player</div>';
      return;
    }

    const video = document.getElementById('video');
    const unmuteBtn = document.getElementById('unmuteBtn');
    const player = new shaka.Player(video);

    // Configurar manejo de errores
    player.addEventListener('error', e => {
      console.error('Error de Shaka Player:', e.detail);
      video.style.display = 'none';
      document.body.innerHTML += '<div style="color: #ff6b6b; padding: 20px; font-size: 16px;">Error al cargar el stream. Verifica la consola para más detalles.</div>';
    });

    video.addEventListener('error', (e) => {
      console.error('Error de video:', e);
    });

    // Configurar el stream (sin DRM por ahora para simplificar)
    const streamUrl = 'https://zap-live1-ott.izzigo.tv/12/out/u/dash/BANDAMAX-HD/default.mpd';
    
    console.log('Cargando stream:', streamUrl);
    
    try {
      await player.load(streamUrl);
      console.log('Stream cargado exitosamente');
      
      // Intentar autoplay
      video.muted = true;
      try {
        await video.play();
        console.log('Video reproduciendo (muted)');
      } catch (playErr) {
        console.warn('No se pudo autoplay:', playErr);
      }
    } catch (loadErr) {
      console.error('Error cargando MPD:', loadErr);
      document.body.innerHTML += '<div style="color: #ff6b6b; padding: 20px;">No se pudo cargar el stream. URL: ' + streamUrl + '</div>';
    }

    // Función para activar audio
    async function tryEnableAudio() {
      try {
        video.muted = false;
        await video.play();
        if (unmuteBtn) {
          unmuteBtn.style.display = 'none';
        }
        console.log('Audio activado');
      } catch (err) {
        console.error('Error activando audio:', err);
      }
    }

    if (unmuteBtn) {
      unmuteBtn.addEventListener('click', tryEnableAudio);
    }

    // Activar audio con espacio
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        tryEnableAudio();
      }
    });
  } catch (err) {
    console.error('Error en inicialización:', err);
    document.body.innerHTML += '<div style="color: #ff6b6b; padding: 20px;">Error al inicializar el reproductor.</div>';
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
